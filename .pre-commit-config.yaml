# Pre-commit gate: runs on every commit regardless of who (or what) made the change.
# After copying, pin current versions:  pre-commit autoupdate
# Install hooks once:                    pre-commit install
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-merge-conflict
      - id: check-added-large-files
      - id: detect-private-key

  # Secrets scanner — last line of defence for a public repo
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.21.2  # run pre-commit autoupdate to pin current
    hooks:
      - id: gitleaks

  # Terraform fmt / validate / lint / docs / governance scan
  - repo: https://github.com/antonbabenko/pre-commit-terraform
    rev: v1.96.1  # run pre-commit autoupdate to pin current
    hooks:
      - id: terraform_fmt
      - id: terraform_validate
      - id: terraform_tflint
      - id: terraform_checkov
        args:
          - --args=--quiet
      - id: terraform_docs
        args:
          - --hook-config=--path-to-file=README.md
          - --hook-config=--add-to-existing-file=true
          - --hook-config=--create-file-if-not-exist=true
